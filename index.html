⚙️ JAVASCRIPT (cola no final do <script>)
let carrinho = [];

function adicionar(nome, preco){
carrinho.push({nome, preco});
atualizarCarrinho();
}

function remover(index){
carrinho.splice(index,1);
atualizarCarrinho();
}

function atualizarCarrinho(){
let itens = document.getElementById("itens");
let total = 0;

itens.innerHTML = "";

carrinho.forEach((p,i)=>{
total += p.preco;

itens.innerHTML += `
<div class="item">
${p.nome} - R$ ${p.preco}
<button onclick="remover(${i})">X</button>
</div>
`;
});

document.getElementById("total").innerText = total;

let texto = carrinho.map(p=>p.nome).join(", ");
document.getElementById("finalizar").href =
`https://wa.me/5511979904099?text=Quero comprar: ${texto} - Total R$ ${total}`;
}

let marcaSelecionada = "todos";

/* BUSCA */
document.getElementById("busca").addEventListener("keyup", aplicarFiltros);

function setMarca(m){
marcaSelecionada = m;
destacarBotao(m);
aplicarFiltros();
}

function setPreco(p){
precoSelecionado = p;
aplicarFiltros();
}

function destacarBotao(marca){
document.querySelectorAll(".botoes button").forEach(btn=>{
btn.classList.remove("ativo");
});

let btn = document.getElementById("btn-" + marca);
if(btn) btn.classList.add("ativo");
}

function aplicarFiltros(){

let valor = document.getElementById("busca").value.toLowerCase();

let filtrado = lista.filter(p=>{

let okNome = p.nome.toLowerCase().includes(valor);

let okMarca = marcaSelecionada === "todos" || p.marca === marcaSelecionada;

let okPreco =
precoSelecionado === "todos" ||
(precoSelecionado === "barato" && p.preco <= 180) ||
(precoSelecionado === "caro" && p.preco > 180);

return okNome && okMarca && okPreco;

});

mostrar(filtrado);
}
