

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impacto Tênis</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* TOPO */
header{
text-align:center;
padding:20px;
border-bottom:2px solid #00ff66;
}

h1{
color:#00ff66;
margin:0;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:#111;
border-radius:12px;
padding:10px;
text-align:center;
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.05);
}

/* PROMO */
.promo{
position:absolute;
top:8px;
left:8px;
background:red;
padding:4px 8px;
font-size:12px;
border-radius:6px;
}

/* IMAGEM */
.card img{
width:100%;
border-radius:10px;
}

/* DESCRIÇÃO */
.desc{
font-size:13px;
color:#ccc;
}

/* ESTRELAS */
.estrelas{
color:gold;
margin:5px 0;
}

/* PREÇO */
.preco{
font-size:18px;
color:#00ff66;
font-weight:bold;
}

/* BOTÃO */
.btn{
display:block;
margin-top:8px;
padding:10px;
background:#00ff66;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

/* WHATSAPP FLUTUANTE */
.whats{
position:fixed;
bottom:15px;
right:15px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<h1>Impacto Tênis</h1>
<p>Os melhores tênis com preço baixo</p>
</header>

<div class="grid" id="produtos"></div>

<a class="whats" href="https://wa.me/5511979904099" target="_blank">💬</a>

<script>

let lista = [

{
nome:"Nike Air Max",
preco:199,
desc:"Conforto extremo e estilo moderno",
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=60",
promo:true
},

{
nome:"Adidas Run Falcon",
preco:179,
desc:"Leve e perfeito para o dia a dia",
img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=500&q=60",
promo:false
},

{
nome:"Puma RS-X",
preco:189,
desc:"Design moderno e confortável",
img:"https://images.unsplash.com/photo-1593032465171-8c3b5b2c1d65?auto=format&fit=crop&w=500&q=60",
promo:true
}

];

let container = document.getElementById("produtos");

function mostrar(){
container.innerHTML="";

lista.forEach(p=>{
container.innerHTML+=`
<div class="card">

${p.promo ? '<div class="promo">PROMO</div>' : ''}

<img src="${p.img}">

<h3>${p.nome}</h3>

<p class="desc">${p.desc}</p>

<div class="estrelas">⭐⭐⭐⭐⭐</div>

<p class="preco">R$ ${p.preco}</p>

<a class="btn" target="_blank"
href="https://wa.me/5511979904099?text=Quero%20esse%20${p.nome}">
Comprar no WhatsApp
</a>

</div>`;
});
}

mostrar();

</script>

</body>
</html>
