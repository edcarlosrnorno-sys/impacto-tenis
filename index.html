<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impacto Tênis</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:#000;
}

/* FUNDO COM TENIS */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1000&q=60") center/cover;
opacity:0.08;
z-index:-1;
}

/* TOPO */
header{
text-align:center;
padding:20px;
background:#0a0a0a;
border-bottom:2px solid #00ff66;
}

/* LOGO */
.logo{
width:140px;
}

/* INSTAGRAM */
.insta{
margin-top:10px;
}

.insta img{
width:30px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:#111;
border-radius:12px;
padding:10px;
text-align:center;
transition:0.3s;
position:relative;
}

.card:hover{
transform:scale(1.05);
}

/* PROMO */
.promo{
position:absolute;
top:8px;
left:8px;
background:red;
padding:4px 8px;
font-size:12px;
border-radius:6px;
}

/* IMG */
.card img{
width:100%;
border-radius:10px;
}

/* TEXTO */
.desc{
font-size:13px;
color:#ccc;
}

.estrelas{
color:gold;
margin:5px 0;
}

.preco{
font-size:18px;
color:#00ff66;
font-weight:bold;
}

/* BOTÃO */
.btn{
display:block;
margin-top:8px;
padding:10px;
background:#00ff66;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

/* WHATSAPP */
.whats{
position:fixed;
bottom:15px;
right:15px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Impacto Tênis</h1>

<div class="insta">
<a href="https://instagram.com/edcasaoficial" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>
</div>

</header>

<div class="grid" id="produtos"></div>

<a class="whats" href="https://wa.me/5511979904099" target="_blank">💬</a>

<script>

let lista = [

{
nome:"Nike Air Max",
preco:199,
desc:"Conforto extremo e estilo moderno",
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=60",
promo:true
},

{
nome:"Adidas Run Falcon",
preco:179,
desc:"Leve e perfeito para o dia a dia",
img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=500&q=60",
promo:false
},

{
nome:"Puma RS-X",
preco:189,
desc:"Design moderno e confortável",
img:"https://images.unsplash.com/photo-1593032465171-8c3b5b2c1d65?auto=format&fit=crop&w=500&q=60",
promo:true
}

];

let container = document.getElementById("produtos");

function mostrar(){
container.innerHTML="";

lista.forEach(p=>{
container.innerHTML+=`
<div class="card">

${p.promo ? '<div class="promo">PROMO</div>' : ''}

<img src="${p.img}">

<h3>${p.nome}</h3>

<p class="desc">${p.desc}</p>

<div class="estrelas">⭐⭐⭐⭐⭐</div>

<p class="preco">R$ ${p.preco}</p>

<a class="btn" target="_blank"
href="https://wa.me/5511979904099?text=Quero%20esse%20${p.nome}">
Comprar no WhatsApp
</a>

</div>`;
});
}

mostrar();

</script>

</body>
</html>
