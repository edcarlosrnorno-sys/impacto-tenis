
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impacto Tênis</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:10px;
}

.card{
background:#111;
padding:10px;
border-radius:12px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.btn{
display:block;
margin-top:8px;
padding:10px;
background:#00ff66;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Impacto Tênis</h2>

<div class="grid" id="produtos"></div>

<script>

let lista = [

{
nome:"Nike Air Max",
preco:199,
marca:"nike",
img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=60",
promo:true
},

{
nome:"Adidas Run Falcon",
preco:179,
marca:"adidas",
img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=500&q=60",
promo:false
},

{
nome:"Puma RS-X",
preco:189,
marca:"puma",
img:"https://images.unsplash.com/photo-1593032465171-8c3b5b2c1d65?auto=format&fit=crop&w=500&q=60",
promo:true
}

];

let container = document.getElementById("produtos");

function mostrar(produtos){
container.innerHTML="";

produtos.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<a class="btn" target="_blank"
href="https://wa.me/5511979904099?text=Quero%20esse%20${p.nome}">
Comprar
</a>
</div>`;
});
}

mostrar(lista);

</script>

</body>
</html>
